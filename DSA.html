<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBounty - DSA</title>
    <link rel="stylesheet" href="styledsa.css">
    <script src="scriptdsa.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body> 
        <!-- Navbar -->
        <div class="navbar">
            <div class="navbar-top">
                <div class="logo">Code<span>Bounty</span></div>
                <div class="profile"><i class="fas fa-user-circle"></i> Profile</div>
            </div>
            <div class="navbar-bottom">
                <a href="dashboard.html"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-code"></i> Web Dev</a>
                <a href="#"><i class="fas fa-sitemap"></i> System Design</a>
                <a href="#"><i class="fas fa-map"></i> Roadmap</a>
                <a href="#"><i class="fas fa-tasks"></i> Practice</a>
            </div>
        </div>
    
        <!-- Main Container -->
        <div class="container">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>DSA Topics</h2>
                <ul>
                    <li onclick="showContent('Arrays')"><i class="fas fa-th"></i> Arrays</li>
                    <li onclick="showContent('Linked List')"><i class="fas fa-link"></i> Linked List</li>
                    <li onclick="showContent('Stack')"><i class="fas fa-layer-group"></i> Stack</li>
                    <li onclick="showContent('Queue')"><i class="fas fa-stream"></i> Queue</li>
                    <li onclick="showContent('Sorting Algorithms')"><i class="fas fa-sort"></i> Sorting</li>
                    <li onclick="showContent('Searching Algorithms')"><i class="fas fa-search"></i> Searching</li>
                    <li onclick="showContent('Graph Algorithms')"><i class="fas fa-project-diagram"></i> Graphs</li>
                    <li onclick="showContent('Divide & Conquer')"><i class="fas fa-cut"></i> Divide & Conquer</li>
                    <li onclick="showContent('Dynamic Programming')"><i class="fas fa-brain"></i> Dynamic Programming</li>
                    <li onclick="showContent('Greedy Algorithms')"><i class="fas fa-coins"></i> Greedy</li>
                </ul>
            </div>
    
            <!-- Content Area -->
            <div class="content">
                <h1>Data Structures & Algorithms</h1>
                <div id="display-content">
                    <p>Select a topic to view content.</p>
                </div>
            </div>
        </div>
    
        <script>
            function showContent(topic) {
                document.getElementById("display-content").innerHTML = "<h2>" + topic + "</h2><p>Content for " + topic + " will be displayed here.</p>";
            }
        </script>
    
    </body>
    </html>
